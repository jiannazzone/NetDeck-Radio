<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#08090d">
  <link rel="icon" type="image/png" href="/logo.png">
  <link rel="icon" type="image/svg+xml" href="/logo.svg">
  <title>NetDeck Radio</title>
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>
  <a href="#app" class="skip-link">Skip to content</a>
  <header class="app-header">
    <div class="app-header__inner">
      <a href="#/" class="app-header__logo">
        <img class="app-header__logo-icon" src="/logo.svg" alt="" width="24" height="24" aria-hidden="true">
        NetDeck Radio
      </a>
      <nav class="app-header__nav">
        <a href="#/" class="app-header__link">Active Nets</a>
        <a href="#/past" class="app-header__link">Past Nets</a>
        <button class="font-size-btn" aria-label="Change font size" title="Font size">A</button>
        <div class="settings-wrap">
          <button class="settings-btn" aria-label="Settings" title="Settings">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
          <div class="settings-popover" id="settings-popover">
            <label class="settings-popover__label" for="callsign-input">My Callsign</label>
            <div class="settings-popover__row">
              <input class="settings-popover__input" id="callsign-input" type="text" placeholder="e.g. W1AW" autocomplete="off" spellcheck="false">
              <button class="settings-popover__confirm" id="callsign-confirm" type="button" aria-label="Confirm callsign" title="Confirm">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
              </button>
            </div>
            <span class="settings-popover__hint">Saves automatically</span>
          </div>
        </div>
      </nav>
    </div>
  </header>
  <main id="app"></main>
  <footer class="app-footer">
    <div class="app-footer__inner">
      <span>Powered by <a href="https://www.netlogger.org" target="_blank" rel="noopener">NetLogger</a></span>
      <a href="https://github.com/jiannazzone/NetDeck-Radio" target="_blank" rel="noopener">GitHub</a>
    </div>
  </footer>
  <script>
(function() {
  var sizes = ['', 'font-large', 'font-compact'];
  var labels = ['A', 'A+', 'A\u2212'];
  var idx = sizes.indexOf(localStorage.getItem('fontSize') || '');
  if (idx < 0) idx = 0;
  if (sizes[idx]) document.documentElement.classList.add(sizes[idx]);
  document.addEventListener('DOMContentLoaded', function() {
    var btn = document.querySelector('.font-size-btn');
    if (!btn) return;
    btn.textContent = labels[idx];
    btn.addEventListener('click', function() {
      if (sizes[idx]) document.documentElement.classList.remove(sizes[idx]);
      idx = (idx + 1) % sizes.length;
      if (sizes[idx]) document.documentElement.classList.add(sizes[idx]);
      localStorage.setItem('fontSize', sizes[idx]);
      btn.textContent = labels[idx];
    });
  });
})();
// Settings popover — callsign persistence
(function() {
  document.addEventListener('DOMContentLoaded', function() {
    var btn = document.querySelector('.settings-btn');
    var popover = document.getElementById('settings-popover');
    var input = document.getElementById('callsign-input');
    var confirmBtn = document.getElementById('callsign-confirm');
    if (!btn || !popover || !input) return;

    // Load saved callsign
    var saved = localStorage.getItem('myCallsign') || '';
    input.value = saved;

    function saveCallsign() {
      var val = input.value.trim().toUpperCase();
      input.value = val;
      localStorage.setItem('myCallsign', val);
      document.dispatchEvent(new CustomEvent('callsign-change', { detail: { callsign: val } }));
    }

    function closePopover() {
      popover.classList.add('settings-popover--closing');
      popover.addEventListener('animationend', function handler() {
        popover.classList.remove('settings-popover--open', 'settings-popover--closing');
        popover.removeEventListener('animationend', handler);
      });
    }

    function confirmAndClose() {
      saveCallsign();
      closePopover();
    }

    // Toggle popover
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      if (popover.classList.contains('settings-popover--open')) {
        closePopover();
      } else {
        popover.classList.add('settings-popover--open');
        input.focus();
      }
    });

    // Close on outside click
    document.addEventListener('click', function(e) {
      if (popover.classList.contains('settings-popover--open') && !popover.contains(e.target) && e.target !== btn) {
        closePopover();
      }
    });

    // Close on Escape
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && popover.classList.contains('settings-popover--open')) {
        closePopover();
      }
    });

    // Enter key confirms and closes
    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        confirmAndClose();
      }
    });

    // Confirm button
    if (confirmBtn) {
      confirmBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        confirmAndClose();
      });
    }

    // Save callsign on input (debounced)
    var timer;
    input.addEventListener('input', function() {
      clearTimeout(timer);
      timer = setTimeout(saveCallsign, 300);
    });
  });
})();
</script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
