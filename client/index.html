<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#08090d">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='22' width='6' height='8' rx='1' fill='%23e8a135'/%3E%3Crect x='13' y='14' width='6' height='16' rx='1' fill='%23e8a135'/%3E%3Crect x='22' y='4' width='6' height='26' rx='1' fill='%23e8a135'/%3E%3C/svg%3E">
  <title>NetDeck Radio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>
  <header class="app-header">
    <div class="app-header__inner">
      <a href="#/" class="app-header__logo">
        <span class="app-header__logo-icon" aria-hidden="true">
          <span></span><span></span><span></span>
        </span>
        NetDeck Radio
      </a>
      <nav class="app-header__nav">
        <a href="#/" class="app-header__link" data-route="nets">Active Nets</a>
        <a href="#/past" class="app-header__link" data-route="past">Past Nets</a>
        <button class="font-size-btn" aria-label="Change font size" title="Font size">A</button>
      </nav>
    </div>
  </header>
  <main id="app"></main>
  <script>
(function() {
  var sizes = ['', 'font-large', 'font-compact'];
  var labels = ['A', 'A+', 'A\u2212'];
  var idx = sizes.indexOf(localStorage.getItem('fontSize') || '');
  if (idx < 0) idx = 0;
  if (sizes[idx]) document.documentElement.classList.add(sizes[idx]);
  document.addEventListener('DOMContentLoaded', function() {
    var btn = document.querySelector('.font-size-btn');
    if (!btn) return;
    btn.textContent = labels[idx];
    btn.addEventListener('click', function() {
      if (sizes[idx]) document.documentElement.classList.remove(sizes[idx]);
      idx = (idx + 1) % sizes.length;
      if (sizes[idx]) document.documentElement.classList.add(sizes[idx]);
      localStorage.setItem('fontSize', sizes[idx]);
      btn.textContent = labels[idx];
    });
  });
})();
</script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
